<mat-sidenav-container class="container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="brand">
      <mat-icon>inventory_2</mat-icon>
      <span>Product Obs</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/products" routerLinkActive="active" data-cy="nav-products">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Products</span>
      </a>

      <a mat-list-item routerLink="/categories" routerLinkActive="active" data-cy="nav-categories">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categories</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <span class="title">Dashboard</span>
      <span class="spacer"></span>

      <span class="user" *ngIf="user$ | async as u">
        {{ u.name }} · {{ u.email }}
      </span>

      <button mat-raised-button color="accent" (click)="logout()" data-cy="logout-button">
        Logout
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
