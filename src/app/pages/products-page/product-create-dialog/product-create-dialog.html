<h2 mat-dialog-title>{{ title }}</h2>

<div mat-dialog-content class="content">
    <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="form.name" name="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <input matInput [(ngModel)]="form.description" name="description"
            required />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" [(ngModel)]="form.price" name="price"
            required />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Expiry date</mat-label>
        <input matInput type="date" [(ngModel)]="form.expiryDate"
            name="expiryDate" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="form.categoryId" name="categoryId" required>
            <mat-option *ngFor="let c of categories" [value]="c.id">
                {{ c.name }}
            </mat-option>
        </mat-select>
    </mat-form-field>
</div>

<div mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="submit()">{{ submitLabel
        }}</button>
</div>
