<div class="page">
    <div class="header">
        <h2>Categories</h2>
        <div class="header-actions">
            <a mat-button routerLink="/products">
                <mat-icon>shopping_cart</mat-icon>
                Products
            </a>

            <button mat-raised-button color="primary" (click)="openCreate()"
                [disabled]="loading">
                <mat-icon>add</mat-icon>
                Create
            </button>
        </div>
    </div>

    <mat-card class="card">
        <mat-card-content class="toolbar">
            <button mat-stroked-button (click)="load()" [disabled]="loading">
                <mat-icon>refresh</mat-icon>
                Reload
            </button>

            <span class="spacer"></span>

            <button mat-button (click)="previous()"
                [disabled]="!dataSource.data.length">
                <mat-icon>chevron_left</mat-icon>
                Previous
            </button>
            <button mat-button (click)="next()"
                [disabled]="!dataSource.data.length">
                Next
                <mat-icon>chevron_right</mat-icon>
            </button>
        </mat-card-content>
    </mat-card>

    <div class="grid">
        <mat-card class="card">
            <mat-card-content>
                <div class="table-wrap">
                    <table mat-table [dataSource]="dataSource" matSort
                        class="mat-elevation-z0">

                        <ng-container matColumnDef="id">
                            <th mat-header-cell *matHeaderCellDef
                                mat-sort-header>ID</th>
                            <td mat-cell *matCellDef="let row">#{{ row.id
                                }}</td>
                        </ng-container>

                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef
                                mat-sort-header>Name</th>
                            <td mat-cell *matCellDef="let row">{{ row.name
                                }}</td>
                        </ng-container>

                        <ng-container matColumnDef="description">
                            <th mat-header-cell
                                *matHeaderCellDef>Description</th>
                            <td mat-cell *matCellDef="let row">{{
                                row.description }}</td>
                        </ng-container>

                        <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef></th>
                            <td mat-cell *matCellDef="let row">
                                <button mat-button (click)="selectRow(row)">
                                    <mat-icon>visibility</mat-icon>
                                    Select
                                </button>
                                <button mat-button (click)="openEdit(row)">
                                    <mat-icon>edit</mat-icon>
                                    Edit
                                </button>
                                <button mat-button color="warn"
                                    (click)="openDelete(row)">
                                    <mat-icon>delete</mat-icon>
                                    Delete
                                </button>
                            </td>
                        </ng-container>

                        <tr mat-header-row
                            *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row
                            *matRowDef="let row; columns: displayedColumns;"
                            (click)="selectRow(row)"
                            [class.selected]="isSelected(row)">
                        </tr>
                    </table>
                </div>

                <mat-paginator [pageSize]="10" [pageSizeOptions]="[5,10,25]"
                    showFirstLastButtons></mat-paginator>
            </mat-card-content>
        </mat-card>

        <mat-card class="card details">
            <mat-card-title>Details</mat-card-title>

            <mat-card-content *ngIf="selected; else empty">
                <div class="kv"><span>ID</span><span>#{{ selected.id
                        }}</span></div>
                <div class="kv"><span>Name</span><span>{{ selected.name
                        }}</span></div>
                <div class="kv"><span>Description</span><span>{{
                        selected.description }}</span></div>

                <div class="detail-actions">
                    <button mat-stroked-button (click)="previous()">
                        <mat-icon>chevron_left</mat-icon> Previous
                    </button>
                    <button mat-stroked-button (click)="next()">
                        Next <mat-icon>chevron_right</mat-icon>
                    </button>
                    <button mat-button (click)="clearSelection()">Clear</button>
                </div>
            </mat-card-content>

            <ng-template #empty>
                <mat-card-content class="muted">
                    Select a category row to see details.
                </mat-card-content>
            </ng-template>
        </mat-card>
    </div>
</div>
