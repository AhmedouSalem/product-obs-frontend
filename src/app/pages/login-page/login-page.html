<div class="wrap">
    <mat-card class="card">
        <mat-card-header>
            <mat-card-title>Sign in</mat-card-title>
            <mat-card-subtitle>Use your email or username</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form (ngSubmit)="submit()" class="form">
                <mat-form-field appearance="outline">
                    <mat-label>Login</mat-label>
                    <input matInput name="login" [(ngModel)]="login" data-cy="login-username" required />
                    <mat-icon matSuffix>person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Password</mat-label>
                    <input matInput name="password" [(ngModel)]="password"
                        type="password" data-cy="login-password" required />
                    <mat-icon matSuffix>lock</mat-icon>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit"
                    [disabled]="loading" data-cy="login-submit">
                    {{ loading ? 'Signing in…' : 'Sign in' }}
                </button>

                <div class="error" *ngIf="error" data-cy="login-error">{{ error }}</div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
